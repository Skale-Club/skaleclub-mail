version: '3.8'

services:
  app:
    build: .
    ports:
      - "9001:9001"
      - "25:25"
      - "587:587"
      - "993:993"
    environment:
      - NODE_ENV=production
      - PORT=9001
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - OUTLOOK_TOKEN_ENCRYPTION_KEY=${OUTLOOK_TOKEN_ENCRYPTION_KEY}
      - MAIL_DOMAIN=${MAIL_DOMAIN:-skale.club}
      - SMTP_SUBMISSION_PORT=587
      - IMAP_PORT=993
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
    restart: unless-stopped
